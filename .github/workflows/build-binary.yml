name: Build Binaries

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '25'

      - run: npm install

      - name: Build SEA binary
        run: node scripts/build-sea.mjs

      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist/sea
          tar czf agent-orcha-${{ matrix.target }}.tar.gz agent-orcha

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist/sea
          Compress-Archive -Path agent-orcha.exe -DestinationPath agent-orcha-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: agent-orcha-${{ matrix.target }}
          path: dist/sea/agent-orcha-${{ matrix.target }}.*

      - name: Upload to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: dist/sea/agent-orcha-${{ matrix.target }}.*
