name: AgentOrcha

options:
  bundleIdPrefix: com.agentorcha
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

include:
  - app/addons/addons.yml

packages:
  BareKit:
    url: https://github.com/holepunchto/bare-kit-swift
    branch: main
  MLXLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.29.1"

targets:
  AgentOrcha:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentorcha.ios
        PRODUCT_NAME: AgentOrcha
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    info:
      path: app/Info.plist
      properties:
        CFBundleDisplayName: "AgentOrcha"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: "AgentOrcha uses the local network to discover and communicate with P2P peers running Agent Orcha."
        NSBonjourServices:
          - "_agentorcha._tcp"
    entitlements:
      path: app/App.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - framework: app/frameworks/BareKit.xcframework
        embed: true
      - package: BareKit
      - package: MLXLM
        product: MLXLLM
    sources:
      - path: app/
        excludes:
          - "addons/**"
      - path: js/p2p-client.bundle
        optional: true
        buildPhase: resources
    preBuildScripts:
      - name: "Bare Link"
        script: |
          if command -v bare-link &> /dev/null; then
            bare-link --preset ios --out "${SRCROOT}/app/addons" "${SRCROOT}"
          fi
        basedOnDependencyAnalysis: false
      - name: "Bare Pack"
        script: |
          if command -v bare-pack &> /dev/null; then
            bare-pack --preset ios --base "${SRCROOT}" --out "${SRCROOT}/js/p2p-client.bundle" "${SRCROOT}/js/p2p-client.js"
          fi
        basedOnDependencyAnalysis: false
