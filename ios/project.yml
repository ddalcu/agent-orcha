name: AgentOrcha

options:
  bundleIdPrefix: com.agentorcha
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

include:
  - app/addons/addons.yml

packages:
  MLXLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "2.29.1"

targets:
  AgentOrcha:
    type: application
    platform: iOS
    deploymentTarget: 17.0
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentorcha.ios
        PRODUCT_NAME: AgentOrcha
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_OBJC_BRIDGING_HEADER: "app/BareKitBridge/BareKit-Bridging-Header.h"
    info:
      path: app/Info.plist
      properties:
        CFBundleDisplayName: "AgentOrcha"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        NSLocalNetworkUsageDescription: "Agent Orcha uses the local network to discover and communicate with peers on the P2P network. Your messages and attachments are sent directly to peers you choose to chat with, where they are processed by AI models. No data is sent until you grant consent and actively start a conversation."
        NSPhotoLibraryUsageDescription: "Agent Orcha needs access to your photo library to attach images to chat messages sent to AI agents on the P2P network."
        NSBonjourServices:
          - "_agentorcha._tcp"
    entitlements:
      path: app/App.entitlements
      properties:
        com.apple.developer.kernel.increased-memory-limit: true
    dependencies:
      - framework: app/frameworks/BareKit.xcframework
        embed: true
        codeSign: true
      - package: MLXLM
        product: MLXLLM
    sources:
      - path: app/
        excludes:
          - "addons/**"
          - "frameworks/**"
      - path: js/p2p-client.bundle
        optional: true
        buildPhase: resources
    preBuildScripts:
      - name: "Bare Link"
        script: |
          if command -v bare-link &> /dev/null; then
            bare-link --preset ios --out "${SRCROOT}/app/addons" "${SRCROOT}"
          fi
        basedOnDependencyAnalysis: false
      - name: "Bare Pack"
        script: |
          if command -v bare-pack &> /dev/null; then
            bare-pack --preset ios --base "${SRCROOT}" --out "${SRCROOT}/js/p2p-client.bundle" "${SRCROOT}/js/p2p-client.js"
          fi
        basedOnDependencyAnalysis: false
