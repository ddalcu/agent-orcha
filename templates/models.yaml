    provider: local
    engine: lmstudio
    baseUrl: http://localhost:1234/v1
    model: nomic-ai/text-embedding-nomic-embed-text-v1.5
  ollama:
    provider: local
    engine: ollama
    baseUrl: http://localhost:11434/v1
