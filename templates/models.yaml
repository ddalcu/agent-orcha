    reasoningBudget: 0
    active: false
    share: false
  openai:
    provider: openai
    apiKey: ${OPENAI_API_KEY}
    model: gpt-4.1
    active: false
    share: false
  anthropic:
    provider: anthropic
    apiKey: ${ANTHROPIC_API_KEY}
    model: claude-sonnet-4-6
    active: false
  gemini:
    provider: gemini
    apiKey: ${GOOGLE_API_KEY}
    model: gemini-3.1-pro-preview
    active: false
embeddings:
  default: omni
  omni:
    provider: omni
    model: nomic-embed-text-v1.5.Q4_K_M
